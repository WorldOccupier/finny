services:
  web:
    build:
      context: ./web
      cache_from:
        - type=local,src=.docker-cache/web
      cache_to:
        - type=local,dest=.docker-cache/web,mode=max
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - server

  server:
    build:
      context: ./server
      cache_from:
        - type=local,src=.docker-cache/server
      cache_to:
        - type=local,dest=.docker-cache/server,mode=max
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: /data/finny.db
    volumes:
      - ./server:/app
      - ./data:/data

volumes:
  web_node_modules:
