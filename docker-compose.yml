services:
  web:
    build:
      context: ./web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - server

  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: /data/finny.db
    volumes:
      - ./server:/app
      - ./data:/data

volumes:
  web_node_modules:
